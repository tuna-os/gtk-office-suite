name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set pkg-config path
        run: |
          export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig" >> $GITHUB_ENV
          pkg-config --modversion gtk4

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Check Code Quality (Clippy)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Unit Tests
        run: cargo test

      - name: Verify Tables Flatpak manifest builds
        run: flatpak-builder --force-clean --nodeps --user build-dir flatpak/org.tunaos.tables-rust.json

      - name: Verify Decks Flatpak manifest builds
        run: flatpak-builder --force-clean --nodeps --user build-dir flatpak/org.tunaos.decks-rust.json

      - name: Verify Letters Flatpak manifest builds
        run: flatpak-builder --force-clean --nodeps --user build-dir flatpak/org.tunaos.letters-rust.json

  gui-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            dbus-x11 \
            at-spi2-core \
            python3-dogtail \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config \
            build-essential

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build apps
        run: cargo build
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig

      - name: Run Headless GUI Tests
        run: |
          chmod +x tests/gui/run_gui_tests.sh
          xvfb-run -a --server-args="-screen 0 1280x1024x24" \
            dbus-launch --exit-with-session \
            bash -c 'NO_BUILD=1 tests/gui/run_gui_tests.sh'
        env:
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig
