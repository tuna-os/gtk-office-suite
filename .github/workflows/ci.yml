name: CI

on: [push, pull_request]

# Rapid alpha pushes: newer commits supersede queued/running CI for the
# same ref instead of stacking up and starving the runner pool.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Unit tests + clippy on Ubuntu 24.04 (has GTK 4.14 + libadwaita 1.5)
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install GTK4 + libadwaita dev libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy (deny warnings, all crates)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # nextest doesn't run doctests (a known limitation) — cargo test
      # --doc covers those separately. #108: JUnit output published as
      # an artifact even on failure, so a failing run's per-test detail
      # survives past the job's own log retention.
      - name: cargo nextest run
        run: cargo nextest run --workspace --profile ci

      - name: cargo test --doc
        run: cargo test --doc --workspace

      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-results
          path: target/nextest/ci/junit.xml
          retention-days: 14

  # LibreOffice interop oracle and coverage moved to nightly.yml (#108):
  # installing LibreOffice + running the full oracle/parity corpus on
  # every single push/PR is what turned this session's 10 renovate PRs
  # into a 26-run GitHub Actions queue backlog. Still runs daily plus
  # on-demand via workflow_dispatch — see nightly.yml for the reasoning.

  # Flatpak builds — uses Flatpak SDK container (no Rust needed)
  flatpak:
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        app: [letters-rust, tables-rust, decks-rust]
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v7

      - name: Build Flatpak — org.tunaos.${{ matrix.app }}
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ matrix.app }}.flatpak
          manifest-path: flatpak/org.tunaos.${{ matrix.app }}.json
          cache-key: flatpak-${{ matrix.app }}-${{ github.sha }}
