name: CI

on: [push, pull_request]

# Rapid alpha pushes: newer commits supersede queued/running CI for the
# same ref instead of stacking up and starving the runner pool.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Unit tests + clippy on Ubuntu 24.04 (has GTK 4.14 + libadwaita 1.5)
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 + libadwaita dev libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace

      - name: cargo clippy (core crates, deny warnings)
        run: cargo clippy -p suite-common-core -p letters-core -p tables-core -p decks-core -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  # LibreOffice interop oracle: every .docx letters-core writes must open
  # in LibreOffice Writer and extract identical text (both directions).
  # Core crates only — no GTK needed. REQUIRE_SOFFICE turns a missing
  # oracle into a failure so this check can never silently skip.
  oracle:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install LibreOffice (headless Writer, Calc, Impress)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libreoffice-writer libreoffice-calc libreoffice-impress
      - name: Run oracle tests
        env:
          REQUIRE_SOFFICE: "1"
        run: cargo test -p letters-core -p tables-core -p decks-core --test soffice_oracle
      - name: Run LibreOffice-authored parity corpus
        env:
          REQUIRE_SOFFICE: "1"
        run: cargo test -p letters-core --test lo_parity -- --nocapture

  # Coverage — runs on push to main only (installs llvm-tools)
  coverage:
    runs-on: ubuntu-24.04
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK4 deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Install llvm-cov
        run: cargo install cargo-llvm-cov --quiet
      - name: Install llvm-tools
        run: rustup component add llvm-tools-preview
      - name: Run coverage
        run: cargo llvm-cov --workspace --summary-only

  # Flatpak builds — uses Flatpak SDK container (no Rust needed)
  flatpak:
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        app: [letters-rust, tables-rust, decks-rust]
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak — org.tunaos.${{ matrix.app }}
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ matrix.app }}.flatpak
          manifest-path: flatpak/org.tunaos.${{ matrix.app }}.json
          cache-key: flatpak-${{ matrix.app }}-${{ github.sha }}
