name: GUI Tests

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 6am UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gui-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Deterministic AT-SPI smoke tests. These GATE: no `|| true`, no VLM.
  # If they fail, an app does not launch or basic input is broken.
  smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 + libadwaita dev libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build app binaries
        run: cargo build --bin letters --bin tables --bin decks

      - name: Install GUI test dependencies
        run: |
          sudo apt-get install -y -qq xvfb dbus at-spi2-core \
            python3-dogtail python3-pytest python3-pil python3-requests
          python3 -m pip install --break-system-packages mss

      - name: Run smoke tests
        run: tests/gui/run_gui_tests.sh test_smoke.py

  # VLM-judged visual audit. Non-gating (continue-on-error): screenshot
  # judgments flake on model output and need API keys, so they inform
  # rather than block. Failures are still visible in the job UI.
  vlm-audit:
    runs-on: ubuntu-24.04
    needs: smoke
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        app: [letters, tables, decks]
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 + libadwaita dev libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --bin ${{ matrix.app }}

      - name: Install GUI test dependencies
        run: |
          sudo apt-get install -y -qq xvfb dbus at-spi2-core \
            python3-dogtail python3-pytest python3-pil python3-requests
          python3 -m pip install --break-system-packages mss

      - name: Run VLM tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          VLM_BACKEND: gemini
        run: tests/gui/run_gui_tests.sh test_${{ matrix.app }}.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.app }}
          path: tests/gui/*.png
          retention-days: 7
