name: GUI Tests

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 6am UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev libpango1.0-dev libcairo2-dev
      - name: Build all binaries
        run: cargo build --bin letters --bin decks --bin tables
      - name: Check Python tests compile
        run: |
          for f in tests/gui/test_*.py tests/gui/framework/base.py; do
            python3 -m py_compile "$f" && echo "  OK $f" || echo "  FAIL $f"
          done

  gui-tests-qemu:
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        app: [letters, decks, tables]
    steps:
      - uses: actions/checkout@v4
      - name: Install GTK deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev libpango1.0-dev libcairo2-dev
      - name: Build binary
        run: cargo build --bin ${{ matrix.app }}
      - name: Run GUI tests inside Xvfb
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          # Install test deps
          sudo apt-get install -y -qq at-spi2-core python3-dogtail xvfb
          # Start virtual display
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 1
          export DISPLAY=:99
          export VLM_BACKEND=gemini
          export GDK_BACKEND=x11
          # Run tests (allow failure — screenshots still uploaded)
          cd tests/gui
          python3 -m pytest test_${{ matrix.app }}.py -v --tb=short 2>&1 | tee /tmp/test-results.log || true
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.app }}
          path: tests/gui/*.png
          retention-days: 7
