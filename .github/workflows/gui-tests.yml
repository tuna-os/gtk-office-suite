name: GUI Tests

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 6am UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gui-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Deterministic AT-SPI smoke tests. These GATE: no `|| true`, no VLM.
  # If they fail, an app does not launch or basic input is broken.
  smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # #108: only run the AT-SPI journeys for apps a change could
      # actually affect, instead of always running all three. A change
      # to a shared crate (suite-common*, suite-export) or the test
      # harness itself can affect every app, so those — and anything we
      # fail to classify — fall back to running everything. Silence here
      # would mean silently losing coverage, so "unsure" always means
      # "run it all," never "skip it."
      - name: Determine affected apps
        id: affected
        run: |
          case "${{ github.event_name }}" in
            schedule|workflow_dispatch)
              echo "filter=" >> "$GITHUB_OUTPUT"
              echo "Scheduled/manual run: testing all apps." ;;
            *)
              if [ "${{ github.event_name }}" = "pull_request" ]; then
                base="${{ github.event.pull_request.base.sha }}"
              else
                base="${{ github.event.before }}"
              fi
              if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
                echo "filter=" >> "$GITHUB_OUTPUT"
                echo "No usable base commit: testing all apps."
              else
                changed=$(git diff --name-only "$base" "${{ github.sha }}")
                echo "Changed files:"; echo "$changed"
                shared=0
                echo "$changed" | grep -qE '^(suite-common|suite-common-core|suite-export)/|^tests/gui/(framework/|conftest|run_gui_tests\.sh)|^Cargo\.(toml|lock)$' && shared=1
                apps=""
                if [ "$shared" = "1" ]; then
                  echo "Shared crate or test-harness change: testing all apps."
                else
                  echo "$changed" | grep -qE '^letters(-core)?/' && apps="$apps Letters"
                  echo "$changed" | grep -qE '^tables(-core)?/' && apps="$apps Tables"
                  echo "$changed" | grep -qE '^decks(-core)?/' && apps="$apps Decks"
                fi
                if [ "$shared" = "1" ] || [ -z "$apps" ]; then
                  echo "filter=" >> "$GITHUB_OUTPUT"
                  [ -z "$apps" ] && [ "$shared" != "1" ] && echo "No recognized app path changed: testing all apps (fail-safe)."
                else
                  filter=$(echo "$apps" | xargs | sed 's/ / or /g')
                  echo "filter=-k \"$filter\"" >> "$GITHUB_OUTPUT"
                  echo "Testing only: $filter"
                fi
              fi ;;
          esac

      - name: Install GTK4 + libadwaita dev libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build app binaries
        run: cargo build --bin letters --bin tables --bin decks

      - name: Install GUI test dependencies
        run: |
          sudo apt-get install -y -qq xvfb dbus at-spi2-core matchbox-window-manager \
            python3-dogtail python3-pytest python3-pil python3-requests
          python3 -m pip install --break-system-packages mss

      - name: Run smoke tests
        run: tests/gui/run_gui_tests.sh test_smoke.py ${{ steps.affected.outputs.filter }}

      - name: Run buffer-bridge round-trip tests (Xvfb)
        run: xvfb-run -a cargo test -p letters bridge

  # VLM-judged visual audit. Non-gating (continue-on-error): screenshot
  # judgments flake on model output and need API keys, so they inform
  # rather than block. Failures are still visible in the job UI.
  vlm-audit:
    runs-on: ubuntu-24.04
    needs: smoke
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        app: [letters, tables, decks]
    steps:
      - uses: actions/checkout@v7

      - name: Install GTK4 + libadwaita dev libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --bin ${{ matrix.app }}

      - name: Install GUI test dependencies
        run: |
          sudo apt-get install -y -qq xvfb dbus at-spi2-core matchbox-window-manager \
            python3-dogtail python3-pytest python3-pil python3-requests
          python3 -m pip install --break-system-packages mss

      - name: Run VLM tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          VLM_BACKEND: gemini
        run: tests/gui/run_gui_tests.sh test_${{ matrix.app }}.py

      - name: Upload screenshots
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: screenshots-${{ matrix.app }}
          path: tests/gui/*.png
          retention-days: 7
