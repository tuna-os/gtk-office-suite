name: Publish Flatpaks (Rust)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-tables:
    name: Build Tables (Rust)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - run: flatpak install --noninteractive flathub org.freedesktop.Sdk.Extension.rust-stable//24.08 || true
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/org.tunaos.tables-rust.json
          cache-key: flatpak-builder-tables-rust-${{ github.sha }}
          build-bundle: false
          upload-artifact: false
      - run: flatpak build-bundle --oci --arch=x86_64 repo tables-rust.oci org.tunaos.tables-rust
      - uses: actions/upload-artifact@v4
        with: { name: tables-rust-oci, path: tables-rust.oci/, retention-days: 1 }

  build-letters:
    name: Build Letters (Rust)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - run: flatpak install --noninteractive flathub org.freedesktop.Sdk.Extension.rust-stable//24.08 || true
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/org.tunaos.letters-rust.json
          cache-key: flatpak-builder-letters-rust-${{ github.sha }}
          build-bundle: false
          upload-artifact: false
      - run: flatpak build-bundle --oci --arch=x86_64 repo letters-rust.oci org.tunaos.letters-rust
      - uses: actions/upload-artifact@v4
        with: { name: letters-rust-oci, path: letters-rust.oci/, retention-days: 1 }

  build-decks:
    name: Build Decks (Rust)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - run: flatpak install --noninteractive flathub org.freedesktop.Sdk.Extension.rust-stable//24.08 || true
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/org.tunaos.decks-rust.json
          cache-key: flatpak-builder-decks-rust-${{ github.sha }}
          build-bundle: false
          upload-artifact: false
      - run: flatpak build-bundle --oci --arch=x86_64 repo decks-rust.oci org.tunaos.decks-rust
      - uses: actions/upload-artifact@v4
        with: { name: decks-rust-oci, path: decks-rust.oci/, retention-days: 1 }

  publish:
    name: Publish to GHCR + update index
    needs: [build-tables, build-letters, build-decks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { name: tables-rust-oci, path: tables-rust.oci }
      - uses: actions/download-artifact@v4
        with: { name: letters-rust-oci, path: letters-rust.oci }
      - uses: actions/download-artifact@v4
        with: { name: decks-rust-oci, path: decks-rust.oci }

      - name: Push OCI images to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          for app in tables-rust letters-rust decks-rust; do
            echo "Pushing ${app}..."
            skopeo copy oci:${app}.oci docker://ghcr.io/tuna-os/${app}:latest
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              skopeo copy oci:${app}.oci docker://ghcr.io/tuna-os/${app}:${{ github.ref_name }}
            fi
          done

      - name: Update centralized flatpak-index
        env:
          FLATPAK_INDEX_TOKEN: ${{ secrets.FLATPAK_INDEX_TOKEN }}
        run: |
          git clone --depth 1 https://x-access-token:${FLATPAK_INDEX_TOKEN}@github.com/tuna-os/flatpak-index.git index-repo
          for app in tables-rust letters-rust decks-rust; do
            python3 .github/scripts/update-index.py \
              --oci-dir ${app}.oci \
              --index-file index-repo/index/static \
              --repo-name tuna-os/${app}
          done
          cd index-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index/static
          if git diff --cached --quiet; then
            echo "No index changes"
          else
            git commit -m "chore(flatpak): update Rust OCI index"
            git push origin main
          fi
