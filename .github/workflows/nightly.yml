name: Nightly

# The full-cost checks split out of ci.yml (#108): LibreOffice interop
# oracle (installs LibreOffice, runs the full corpus against it) and
# coverage. These are real, meaningful checks — but running them on
# every single push/PR is exactly what turned 10 renovate PRs into a
# 26-run queue backlog this session (see docs/session memory on CI
# congestion). Nightly + on-demand keeps that cost off the PR fast lane
# without losing the coverage: a broken oracle/coverage run is still
# caught within a day, and workflow_dispatch lets anyone force a run
# immediately (e.g. before merging a change that touches format I/O).

on:
  schedule:
    - cron: '0 5 * * *'   # daily at 5am UTC (before gui-tests.yml's 6am)
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # LibreOffice interop oracle: every .docx letters-core writes must open
  # in LibreOffice Writer and extract identical text (both directions).
  # Core crates only — no GTK needed. REQUIRE_SOFFICE turns a missing
  # oracle into a failure so this check can never silently skip.
  oracle:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install LibreOffice (headless Writer, Calc, Impress)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libreoffice-writer libreoffice-calc libreoffice-impress
      - name: Run oracle tests
        env:
          REQUIRE_SOFFICE: "1"
        run: cargo test -p letters-core -p tables-core -p decks-core --test soffice_oracle
      - name: Run LibreOffice-authored parity corpus
        env:
          REQUIRE_SOFFICE: "1"
        run: cargo test -p letters-core -p decks-core --test lo_parity -- --nocapture

      - name: Conformance scorecard (job summary)
        env:
          REQUIRE_SOFFICE: "1"
        run: python3 conformance/scorecard.py

      - name: Upload capability-matrix artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-scorecard
          path: conformance/scorecard-latest.md
          retention-days: 90

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install GTK4 deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Install llvm-cov
        run: cargo install cargo-llvm-cov --quiet
      - name: Install llvm-tools
        run: rustup component add llvm-tools-preview
      - name: Run coverage
        run: cargo llvm-cov --workspace --summary-only
