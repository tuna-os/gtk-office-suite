<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="pad-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#57e389"/>
      <stop offset="100%" stop-color="#26a269"/>
    </linearGradient>
    <linearGradient id="sheet-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f5f4"/>
    </linearGradient>
    <linearGradient id="clip-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d3d7cf"/>
      <stop offset="100%" stop-color="#888a85"/>
    </linearGradient>
  </defs>

  <!-- Green Pad Base -->
  <rect x="22" y="16" width="84" height="98" rx="10" fill="url(#pad-grad)" filter="url(#shadow)"/>
  <rect x="23" y="17" width="82" height="2" rx="1" fill="#ffffff" opacity="0.35"/>

  <!-- Stacked Paper Effect -->
  <rect x="27" y="31" width="74" height="74" rx="5" fill="#d3d7cf" opacity="0.7" transform="rotate(-1, 64, 68)"/>
  <rect x="29" y="29" width="74" height="74" rx="5" fill="#eeeeec" opacity="0.9" transform="rotate(1.5, 64, 68)"/>

  <!-- Top Grid Sheet -->
  <rect x="28" y="30" width="72" height="74" rx="5" fill="url(#sheet-grad)" filter="url(#shadow)"/>

  <!-- Grid lines -->
  <!-- Vertical lines -->
  <line x1="48" y1="34" x2="48" y2="100" stroke="#e1e1e0" stroke-width="1.5"/>
  <line x1="72" y1="34" x2="72" y2="100" stroke="#e1e1e0" stroke-width="1.5"/>
  <!-- Horizontal lines -->
  <line x1="32" y1="46" x2="96" y2="46" stroke="#e1e1e0" stroke-width="1.5"/>
  <line x1="32" y1="60" x2="96" y2="60" stroke="#e1e1e0" stroke-width="1.5"/>
  <line x1="32" y1="74" x2="96" y2="74" stroke="#e1e1e0" stroke-width="1.5"/>
  <line x1="32" y1="88" x2="96" y2="88" stroke="#e1e1e0" stroke-width="1.5"/>

  <!-- Headers highlight -->
  <path d="M 28,30 H 100 V 46 H 28 Z" fill="#26a269" opacity="0.12"/>
  <path d="M 28,30 H 48 V 104 H 28 Z" fill="#26a269" opacity="0.08"/>

  <!-- Active Cell Selection cursor -->
  <rect x="48" y="46" width="24" height="14" fill="none" stroke="#26a269" stroke-width="2.5"/>
  <rect x="48" y="46" width="24" height="14" fill="#26a269" opacity="0.15"/>
  <rect x="69" y="57" width="5" height="5" fill="#26a269"/> <!-- Selection handle dot -->

  <!-- Values in cells (dots/lines) -->
  <rect x="34" y="52" width="8" height="3" rx="1" fill="#77767b"/>
  <rect x="78" y="52" width="12" height="3" rx="1" fill="#77767b"/>
  <rect x="78" y="66" width="10" height="3" rx="1" fill="#77767b"/>
  <rect x="54" y="80" width="12" height="3" rx="1" fill="#77767b"/>
  <rect x="78" y="80" width="14" height="3" rx="1" fill="#26a269"/>

  <!-- Metallic Binder Clip at the top -->
  <rect x="46" y="10" width="36" height="15" rx="3" fill="#000000" opacity="0.15"/>
  <rect x="46" y="9" width="36" height="14" rx="3" fill="url(#clip-grad)"/>
  <rect x="47" y="10" width="34" height="1" fill="#ffffff" opacity="0.5"/>
  <path d="M 52,9 C 52,-2 76,-2 76,9" stroke="#eeeeec" stroke-width="2.5" fill="none"/>
  <path d="M 52,9 C 52,-2 76,-2 76,9" stroke="#555753" stroke-width="1" fill="none" opacity="0.4"/>
</svg>
