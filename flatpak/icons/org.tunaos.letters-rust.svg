<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="small-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="pad-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#62a0ea"/>
      <stop offset="100%" stop-color="#1c71d8"/>
    </linearGradient>
    <linearGradient id="paper-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f5f4"/>
    </linearGradient>
    <linearGradient id="clip-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d3d7cf"/>
      <stop offset="100%" stop-color="#888a85"/>
    </linearGradient>
  </defs>

  <!-- Blue Pad Base -->
  <rect x="22" y="16" width="84" height="98" rx="10" fill="url(#pad-grad)" filter="url(#shadow)"/>
  <rect x="23" y="17" width="82" height="2" rx="1" fill="#ffffff" opacity="0.35"/>

  <!-- Stacked Paper Effect (Bottom sheet offset) -->
  <rect x="27" y="31" width="74" height="74" rx="5" fill="#d3d7cf" opacity="0.7" transform="rotate(-1.5, 64, 68)"/>
  <rect x="29" y="29" width="74" height="74" rx="5" fill="#eeeeec" opacity="0.9" transform="rotate(1, 64, 68)"/>

  <!-- Top Paper Sheet -->
  <rect x="28" y="30" width="72" height="74" rx="5" fill="url(#paper-grad)" filter="url(#shadow)"/>

  <!-- Document Text lines -->
  <rect x="38" y="44" width="34" height="6" rx="2" fill="#1c71d8" opacity="0.8"/>
  <rect x="38" y="58" width="52" height="3" rx="1" fill="#babdb6"/>
  <rect x="38" y="66" width="52" height="3" rx="1" fill="#babdb6"/>
  <rect x="38" y="74" width="42" height="3" rx="1" fill="#babdb6"/>
  <rect x="38" y="82" width="52" height="3" rx="1" fill="#babdb6"/>
  <rect x="38" y="90" width="32" height="3" rx="1" fill="#babdb6"/>

  <!-- Metallic Binder Clip at the top -->
  <!-- Clip shadow -->
  <rect x="46" y="10" width="36" height="15" rx="3" fill="#000000" opacity="0.15"/>
  <!-- Clip base plate -->
  <rect x="46" y="9" width="36" height="14" rx="3" fill="url(#clip-grad)"/>
  <rect x="47" y="10" width="34" height="1" fill="#ffffff" opacity="0.5"/>
  <!-- Metallic bracket wire loop -->
  <path d="M 52,9 C 52,-2 76,-2 76,9" stroke="#eeeeec" stroke-width="2.5" fill="none"/>
  <path d="M 52,9 C 52,-2 76,-2 76,9" stroke="#555753" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Diagonal 3D Blue Pencil -->
  <g transform="translate(76, 76) rotate(-40)" filter="url(#small-shadow)">
    <!-- Pencil body -->
    <rect x="-24" y="-3" width="40" height="6" rx="1" fill="#3584e4"/>
    <rect x="-24" y="-3" width="40" height="2" fill="#ffffff" opacity="0.25"/> <!-- Highlight -->
    <!-- Wood tip -->
    <polygon points="16,-3 24,0 16,3" fill="#e9ad7f"/>
    <!-- Lead tip -->
    <polygon points="21,-1.2 24,0 21,1.2" fill="#2e3436"/>
    <!-- Silver collar -->
    <rect x="-26" y="-3" width="4" height="6" fill="#d3d7cf"/>
    <!-- Red eraser -->
    <rect x="-30" y="-3" width="4" height="6" fill="#f66151"/>
  </g>
</svg>
