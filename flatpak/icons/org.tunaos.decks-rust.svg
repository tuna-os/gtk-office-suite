<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="orange-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9f38"/>
      <stop offset="100%" stop-color="#e66100"/>
    </linearGradient>
    <linearGradient id="canvas-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f5f4"/>
    </linearGradient>
    <linearGradient id="stand-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5e5c64"/>
      <stop offset="100%" stop-color="#3d3846"/>
    </linearGradient>
  </defs>

  <!-- Presentation Easel Stand Legs -->
  <path d="M 64,18 L 44,112 M 64,18 L 84,112 M 64,18 L 64,116" stroke="url(#stand-grad)" stroke-width="6" stroke-linecap="round"/>
  <rect x="36" y="98" width="56" height="6" rx="3" fill="url(#stand-grad)"/>

  <!-- Orange Backboard/Board -->
  <rect x="20" y="24" width="88" height="66" rx="8" fill="url(#orange-grad)" filter="url(#shadow)"/>
  <rect x="21" y="25" width="86" height="2" rx="1" fill="#ffffff" opacity="0.35"/>

  <!-- Stacked Slides (Overlapping slide decks) -->
  <rect x="27" y="31" width="74" height="52" rx="4" fill="#d3d7cf" opacity="0.8" transform="rotate(-2, 64, 57)"/>
  <rect x="27" y="31" width="74" height="52" rx="4" fill="#eeeeec" opacity="0.9" transform="rotate(1.5, 64, 57)"/>

  <!-- Top Slide Canvas -->
  <rect x="26" y="30" width="76" height="54" rx="4" fill="url(#canvas-grad)" filter="url(#shadow)"/>

  <!-- Mock Slide Content -->
  <!-- Top bar (Title) -->
  <rect x="34" y="38" width="30" height="5" rx="1.5" fill="#e66100" opacity="0.8"/>
  
  <!-- Content shapes (Text placeholder) -->
  <rect x="34" y="50" width="24" height="3" rx="1.5" fill="#9a9996"/>
  <rect x="34" y="58" width="20" height="3" rx="1.5" fill="#9a9996"/>
  <rect x="34" y="66" width="24" height="3" rx="1.5" fill="#9a9996"/>

  <!-- Pie Chart Graphic on presentation -->
  <circle cx="78" cy="58" r="13" fill="#e66100" opacity="0.2"/>
  <path d="M 78,58 L 78,45 A 13,13 0 0,1 91,58 Z" fill="#e66100" opacity="0.85"/>
  <circle cx="78" cy="58" r="4" fill="#ffffff"/>
</svg>
